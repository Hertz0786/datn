name: Build & Deploy Android to Google Play

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      version_name:
        description: "Version name (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
        type: string
      version_code:
        description: "Version code (integer)"
        required: false
        default: "1"
        type: string

env:
  FLUTTER_VERSION: "3.41.7"

jobs:
  build:
    name: Build release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: fe
        run: flutter pub get

      - name: Analyze code
        working-directory: fe
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: fe
        run: flutter test

      - name: Decode keystore (base64)
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > fe/android/app/key-release.jks
            echo "Keystore restored from base64 secret."
          else
            echo "WARNING: ANDROID_KEYSTORE_BASE64 secret not set. Build will use debug signing." >&2
          fi

      - name: Write key.properties
        working-directory: fe/android
        run: |
          cat > key.properties <<EOF
          storeFile=key-release.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build AAB (release)
        working-directory: fe
        env:
          ENV_FILE: .env.production
        run: |
          flutter build appbundle --release \
            --build-name=${{ github.event.inputs.version_name || '1.0.0' }} \
            --build-number=${{ github.event.inputs.version_code || '1' }} \
            --dart-define-from-file=.env.production

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: fe/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Publish to Google Play
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.kidsocial.app
          releaseFiles: fe/build/app/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          mappingFile: fe/build/app/outputs/mapping/release/mapping.txt
          whatsNewDirectory: fe/android/fastlane/whatsnew
        env:
          SUPPLY_TRACK: ${{ github.event.inputs.track || 'internal' }}
